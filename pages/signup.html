<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Veloura</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: var(--spacing-lg);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            text-align: center;
        }
        .auth-alert {
            display: none;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .auth-alert.error {
            background-color: #FEF2F2;
            color: #DC2626;
            border: 1px solid #F87171;
            display: block;
        }
        .auth-alert.success {
            background-color: #F0FDF4;
            color: #16A34A;
            border: 1px solid #86EFAC;
            display: block;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container nav-container">
            <a href="home.html" class="logo">Veloura</a>
            <nav class="desktop-nav">
                <a href="home.html">Home</a>
                <a href="products.html">Shop</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="nav-actions">
                <div class="search-bar">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" placeholder="Search curated selection...">
                </div>
                <a href="checkout.html" class="nav-icon" aria-label="Cart">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                </a>
                
                <!-- Auth Dropdown Setup -->
                <div class="nav-dropdown" id="navAuthDropdown">
                    <button class="nav-icon" id="navAuthBtn" aria-label="Account">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </button>
                    <div class="nav-dropdown-menu" id="navAuthMenu">
                        <!-- Dynamic content injected by frontend.js -->
                    </div>
                </div>

                <button class="nav-icon mobile-menu-btn" aria-label="Menu">
                   <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container section-padding">
        <div class="auth-container slide-up">
            <h1 class="t-h2 mb-sm">Create Account</h1>
            <p class="t-small mb-md" style="color:var(--text-secondary);">Join Veloura for exclusive access</p>

            <div id="signupAlert" class="auth-alert"></div>

            <form id="frontendSignupForm" style="text-align: left;">
                 <div class="form-group mb-sm">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group mb-sm">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" class="form-control" placeholder="user@veloura.com" required>
                </div>
                <div class="form-group mb-md">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div class="mt-md t-small" style="color:var(--text-secondary);">
                Already have an account? <a href="login.html" style="color:var(--text-primary); font-weight:500; border-bottom: 1px solid currentColor;">Sign in</a>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container text-center t-small text-secondary">
            &copy; 2024 Veloura. As an Amazon Associate, we earn from qualifying purchases.
        </div>
    </footer>

    <script src="../js/frontend.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
